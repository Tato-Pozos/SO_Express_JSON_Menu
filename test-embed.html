// Parse SpotOn JSON into categories and items
function parseJSON(raw) {
    const catNameMap = new Map();
    
    if (raw.menu?.categories && Array.isArray(raw.menu.categories)) {
        raw.menu.categories.forEach(cat => {
            catNameMap.set(cat.id, cat.name);
        });
    }
    
    const categories = [];
    const itemsByCategory = {};
    const itemsFull = new Map();
    
    // First pass: collect all category ids from items
    const allCatIds = new Set();
    
    if (raw.items && Array.isArray(raw.items)) {
        raw.items.forEach(item => {
            if (item.category_ids && Array.isArray(item.category_ids)) {
                item.category_ids.forEach(catId => {
                    allCatIds.add(catId);
                });
            } else if (item.category_id) {
                allCatIds.add(item.category_id);
            }
        });
    }
    
    // Create categories for all catIds, with names from map or default
    allCatIds.forEach(catId => {
        if (!config.excludedCategories.includes(catId)) {
            categories.push({
                id: catId,
                name: catNameMap.get(catId) || "Category " + catId
            });
            itemsByCategory[catId] = [];
        }
    });
    
    // Then add items
    if (raw.items && Array.isArray(raw.items)) {
        raw.items.forEach(item => {
            if (item.category_ids && Array.isArray(item.category_ids)) {
                item.category_ids.forEach(catId => {
                    if (!config.excludedCategories.includes(catId) && itemsByCategory[catId]) {
                        const parsed = {
                            id: item.id,
                            name: item.name,
                            description: item.description || "",
                            price: ((item.price?.amount || item.price || 0) / 100).toFixed(2),
                            imageUrl: item.image_url || item.photos?.[0]?.url,
                            modifier_groups: item.modifier_groups || item.modifiers || []
                        };
                        
                        itemsFull.set(item.id, parsed);
                        itemsByCategory[catId].push(parsed);
                    }
                });
            } else if (item.category_id) {
                const catId = item.category_id;
                if (!config.excludedCategories.includes(catId) && itemsByCategory[catId]) {
                    const parsed = {
                        id: item.id,
                        name: item.name,
                        description: item.description || "",
                        price: ((item.price?.amount || item.price || 0) / 100).toFixed(2),
                        imageUrl: item.image_url || item.photos?.[0]?.url,
                        modifier_groups: item.modifier_groups || item.modifiers || []
                    };
                    
                    itemsFull.set(item.id, parsed);
                    itemsByCategory[catId].push(parsed);
                }
            }
        });
    }
    
    return { categories, itemsByCategory, itemsFull };
}

// Render menu
function render() {
    const root = document.getElementById("spoton-menu-root");
    if (!root || !menuData) return;
    
    const { categories, itemsByCategory } = menuData;
    let filteredCats = categories.filter(c => !config.excludedCategories.includes(c.id));
    
    if (categorySearchQuery) {
        filteredCats = filteredCats.filter(c => c.name.toLowerCase().includes(categorySearchQuery.toLowerCase()));
    }
    
    if (!activeCategoryId && filteredCats.length) {
        activeCategoryId = filteredCats[0].id;
    }
    
    let allCats = categories.filter(c => !config.excludedCategories.includes(c.id));
    
    let layout = config.layoutType;
    let tabsPos = config.tabsPosition;
    let align = config.tabAlign;
    
    let showSearch = config.showCategorySearch;
    let showDropdown = config.showCategoryDropdown;
    
    let html = `<div class="menu-layout tabs-${tabsPos}">`;
    
    // Build toolbar separately so it does NOT affect tab visibility/layout
    let toolbar = `<div class="category-toolbar">`;
    
    // search FIRST
    if (showSearch) {
        toolbar += `
            <input 
                type="text" 
                id="categorySearchInput"
                class="category-search" 
                placeholder="Search categories..."
                value=""
                oninput="window.__spotOnCategorySearch(this.value)"
            />
        `;
    }
    
    // dropdown SECOND
    if (showDropdown) {
        toolbar += `
            <select class="category-select" onchange="window.__spotOnSelectCategory(this.value)">
                ${allCats.map(c => `
                    <option value="${encodeURIComponent(c.id)}" ${c.id === activeCategoryId ? "selected" : ""}>
                        ${c.name}
                    </option>
                `).join("")}
            </select>
        `;
    }
    
    toolbar += `</div>`;
    
    // LEFT SIDE (tabs + toolbar)
    html += `<div class="menu-tabs-area">`;
    
    html += toolbar;
    
    // Categories container hidden when dropdown is enabled
    if (!showDropdown) {
        html += `<div class="categories-container align-${align}">`;
        
        filteredCats.forEach(c=>{
            html += `<div class="category-link ${c.id===activeCategoryId?'active':''}" onclick="window.__spotOnSelectCategory(decodeURIComponent('${encodeURIComponent(c.id)}'))">${c.name}</div>`;
        });
        
        html += `</div>`;
    }
    
    html += `</div>`;
    
    // RIGHT SIDE (menu items)
    html += `<div class="menu-root layout-${layout}" id="menuRoot"></div>`;
    
    html += `</div>`;
    
    // --- STABLE RENDER (NO FULL REBUILD / NO FLICKER) ---
    const preview = document.getElementById("spoton-menu-root");
    if (!preview) return;
    
    // Create or reuse stable containers (tabs + root)
    let layoutRoot = document.getElementById("menuLayoutRoot");
    if (!layoutRoot) {
        preview.innerHTML = `<div id="menuLayoutRoot"></div>`;
        layoutRoot = document.getElementById("menuLayoutRoot");
    }
    
    // Parse generated layout HTML without destroying DOM state
    const temp = document.createElement("div");
    temp.innerHTML = html;
    
    const newLayout = temp.querySelector(".menu-layout");
    if (!newLayout) return;
    
    const existingLayout = layoutRoot.querySelector(".menu-layout");
    
    if (!existingLayout) {
        layoutRoot.appendChild(newLayout);
    } else {
        // Update only children instead of replacing root (prevents flicker)
        existingLayout.replaceWith(newLayout);
    }
    
    if (showSearch) {
        const searchInput = document.getElementById("categorySearchInput");
        if (searchInput) {
            searchInput.value = categorySearchQuery.replace(/"/g, '&quot;');
        }
    }
    
    displayItems(activeCategoryId);
}

// Modal
const modalHtml = `
    <div id="spoton-modal" class="spoton-modal" onclick="if(event.target.id==='spoton-modal') window.__spotOnCloseModal()">
        <div class="spoton-modal-content">
            <button class="spoton-modal-close" onclick="window.__spotOnCloseModal()">&times;</button>
            <div class="spoton-modal-header" id="spoton-modal-title"></div>
            <div id="spoton-modal-body"></div>
        </div>
    </div>
`;

if (!document.getElementById("spoton-modal")) {
    document.body.insertAdjacentHTML('beforeend', modalHtml);
}

function selectCategory(cid){
    if (activeCategoryId === cid) return;
    activeCategoryId = cid;
    render();
}

let categorySearchQuery = "";

function handleCategorySearch(value) {
    categorySearchQuery = value;

    if (!menuData) return;

    let visibleCats = menuData.categories
        .filter(c => !config.excludedCategories.includes(c.id))
        .filter(c => c.name.toLowerCase().includes(categorySearchQuery.toLowerCase()));

    // If current active category disappears, reset it
    if (!visibleCats.find(c => c.id === activeCategoryId)) {
        activeCategoryId = visibleCats[0]?.id || null;
    }

    render();

    // Restore focus to search input after rendering
    setTimeout(() => {
        const searchInput = document.getElementById("categorySearchInput");
        if (searchInput) {
            searchInput.focus();
            // Set cursor to end of input
            searchInput.setSelectionRange(value.length, value.length);
        }
    }, 0);
}

function displayItems(cid){
    let root = document.getElementById("menuRoot");
    if (!root || !menuData) return;
    
    const items = menuData.itemsByCategory[cid] || [];
    
    let html = '';
    
    items.forEach(item => {
        const hasModifiers = config.showModifiers && item.modifier_groups?.length;
        const clickable = hasModifiers ? 'clickable' : '';
        const onclick = hasModifiers ? `onclick="window.__spotOnOpenModal(decodeURIComponent('${encodeURIComponent(item.id)}'))"` : '';
        
        html += `<div class="item ${clickable}" ${onclick}>`;
        
        if (config.showImages && item.imageUrl) {
            html += `<div class="item-img-wrapper"><img class="item-img" src="${item.imageUrl}" alt="${item.name}"></div>`;
        }
        
        html += '<div class="item-content">';
        html += `<div class="item-name">${item.name}</div>`;
        html += `<div class="item-desc">${item.description}</div>`;
        if (config.showPrices) {
            html += `<div class="item-price">$${item.price}</div>`;
        }
        html += '</div>';
        html += '</div>';
    });
    
    root.innerHTML = html;
}

window.__spotOnSelectCategory = function(catId) {
    activeCategoryId = decodeURIComponent(catId);
    render();
};

window.__spotOnCategorySearch = function(value) {
    handleCategorySearch(value);
};

window.__spotOnOpenModal = function(itemId) {
    const item = itemsMap.get(decodeURIComponent(itemId));
    if (!item) return;
    
    document.getElementById("spoton-modal-title").textContent = item.name;
    
    const body = document.getElementById("spoton-modal-body");
    const modifiers = item.modifier_groups || [];
    
    if (!modifiers.length) {
        body.innerHTML = '<div>No modifiers available</div>';
    } else {
        body.innerHTML = modifiers.map(group => `
            <div class="spoton-modifier-group">
                <div class="spoton-modifier-group-name">${group.name || "Options"}</div>
                <div class="spoton-modifier-limits">${group.min_select || 0} - ${group.max_select || "&infin;"} selected</div>
                ${(group.options || []).map(opt => `
                    <div class="spoton-modifier-option">
                        <span>${opt.name}</span>
                        <span>${opt.price ? "$" + (opt.price / 100).toFixed(2) : ""}</span>
                    </div>
                `).join('')}
            </div>
        `).join('');
    }
    
    document.getElementById("spoton-modal").classList.add("active");
};

window.__spotOnCloseModal = function() {
    document.getElementById("spoton-modal").classList.remove("active");
};

// Initialize
async function init() {
    try {
        const res = await fetch(config.jsonUrl);
        const json = await res.json();
        
        const parsed = parseJSON(json);
        menuData = parsed;
        itemsMap = parsed.itemsFull;
        
        applyStyles();
        render();
    } catch (err) {
        console.error("SpotOn Menu: Failed to load", err);
        document.getElementById("spoton-menu-root").innerHTML = 
            '<div style="padding:20px;color:#ef4444;">Failed to load menu. Please check the console.</div>';
    }
}

init();
})();
</script>
